# Deploy full-stack FaceGuard (frontend + backend) trên cùng 1 VM.
# Chạy:  docker compose up -d --build
# Log:   docker compose logs -f
#
# Giả định: PostgreSQL và R2 là managed (đặt trong webapp/backend/.env). Nếu muốn
# chạy Postgres ngay trong compose, bỏ comment service `db` ở cuối.
#
# Cả 2 service publish ra 127.0.0.1; Nginx trên host (deploy/nginx.conf.example) lo
# TLS + định tuyến 2 subdomain: app.your-domain.com -> :3000, api.your-domain.com -> :8000.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: faceguard-backend
    env_file:
      - webapp/backend/.env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      # Giữ model ONNX trên host -> không phải tải lại khi rebuild image.
      - ./ai_core/face_detection/onnx:/app/ai_core/face_detection/onnx
      - ./ai_core/face_parsing/onnx:/app/ai_core/face_parsing/onnx
      - ./ai_core/face_swapping/onnx:/app/ai_core/face_swapping/onnx
      - ./ai_core/face_restoration/onnx:/app/ai_core/face_restoration/onnx
      - ./ai_core/voice_anonymization/onnx:/app/ai_core/voice_anonymization/onnx
    restart: unless-stopped
    # --- GPU (tùy chọn): cần nvidia-container-toolkit + base image CUDA ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  frontend:
    build:
      context: ./webapp/frontend
      dockerfile: Dockerfile
    image: faceguard-frontend
    environment:
      # PHẢI là URL backend công khai (browser nối WS thẳng tới đây). Đổi sang domain thật.
      - BACKEND_API_BASE_URL=https://api.your-domain.com/api
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # --- Postgres chạy trong compose (tùy chọn) ---
