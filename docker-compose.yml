# FaceGuard Docker Compose for Development & Testing
# For production on Vast.ai, use the single Dockerfile instead

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: faceguard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-faceguard}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-faceguard_secret}
      POSTGRES_DB: ${DB_NAME:-faceguard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-faceguard}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - faceguard-network

  # Backend API (FastAPI + AI Core)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: python-backend
    container_name: faceguard-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-faceguard}:${DB_PASSWORD:-faceguard_secret}@postgres:5432/${DB_NAME:-faceguard}
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      
      # Cloudflare R2 Storage
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_REGION: auto
      
      # Kaggle (for downloading ONNX models on first run)
      KAGGLE_USERNAME: ${KAGGLE_USERNAME:-}
      KAGGLE_KEY: ${KAGGLE_KEY:-}
      
      # CORS
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      
      # Video Processing
      VIDEO_MAX_UPLOAD_MB: 2048
      
      # Live Camera Settings
      LIVE_JPEG_QUALITY: 80
      LIVE_DETECT_INTERVAL: 2
      LIVE_MAX_CONCURRENT_FRAMES: 2
    
    volumes:
      - ./outputs:/app/outputs
      - ./temp:/app/temp
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - faceguard-network
    command: >
      bash -c "
        if [ ! -f /app/ai_core/face_detection/onnx/retinaface_best.onnx ]; then
          echo 'Downloading ONNX models...' &&
          python /app/scripts/download_onnx_files.py
        fi &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Frontend (Next.js)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-builder
    container_name: faceguard-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./webapp/frontend:/frontend
      - /frontend/node_modules
    networks:
      - faceguard-network
    command: pnpm dev --hostname 0.0.0.0

volumes:
  postgres_data:

networks:
  faceguard-network:
    driver: bridge
